---
layout: default
---
<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}" class="tag">{{ tag }}</a>
      {% endfor %}
    </div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-footer">
    <a href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a>
  </div>
</article>
